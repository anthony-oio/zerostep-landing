<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: grid; place-items: center;
      /* murky mossy-green field, a touch brighter than the page so the mark reads small */
      background:
        radial-gradient(80% 70% at 30% 22%, rgba(150,160,70,.5) 0%, transparent 55%),
        radial-gradient(120% 120% at 60% 100%, #243012 0%, #3a4a1c 45%, #2a3814 80%, #18200c 100%);
    }
    .ic { width: 86%; filter: drop-shadow(0 0 6% rgba(255,170,60,.6)) drop-shadow(0 0 14% rgba(255,120,30,.4)); }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="ic">
    <svg viewBox="0 0 200 200" role="img" aria-label="zerostep">
      <defs>
        <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ffe27a"/>
          <stop offset="38%" stop-color="#ffb238"/>
          <stop offset="72%" stop-color="#f4621f"/>
          <stop offset="100%" stop-color="#c92516"/>
        </linearGradient>
      </defs>
      <text x="100" y="158" text-anchor="middle"
            font-family="'Caveat Brush', system-ui, sans-serif"
            font-size="210"
            fill="url(#warm)"
            stroke="#2a0d06" stroke-width="7"
            stroke-linejoin="round" paint-order="stroke">z</text>
    </svg>
  </div>
</body>
</html>
