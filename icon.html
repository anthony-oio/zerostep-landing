<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: grid; place-items: center;
      /* murky green-amber field with a cool centre, matching the page */
      background:
        radial-gradient(70% 60% at 50% 46%, rgba(40,150,210,.4) 0%, transparent 60%),
        radial-gradient(120% 120% at 60% 100%, #142420 0%, #2c3a1c 45%, #22300f 80%, #0e160c 100%);
    }
    .ic { width: 86%; }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="ic">
    <svg viewBox="0 0 200 200" role="img" aria-label="zerostep">
      <defs>
        <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#bdeeff"/>
          <stop offset="32%" stop-color="#4fc6f6"/>
          <stop offset="68%" stop-color="#1f78c6"/>
          <stop offset="100%" stop-color="#10314f"/>
        </linearGradient>
      </defs>
      <text x="100" y="158" text-anchor="middle"
            font-family="'Caveat Brush', system-ui, sans-serif"
            font-size="210"
            fill="url(#warm)"
            stroke="#07182c" stroke-width="7"
            stroke-linejoin="round" paint-order="stroke">z</text>
    </svg>
  </div>
</body>
</html>
